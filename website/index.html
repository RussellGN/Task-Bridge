<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <link rel="icon" type="image/png" href="/favicon.png" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Task Bridge</title>
      <meta
         name="description"
         content="A desktop app for simplified GitHub issues tracking & management. Designed for people needing a simpler way to stay on top of development projects without needing to be GitHub experts."
      />
      <meta name="keywords" content="GitHub, issues, progress tracking, project management, desktop app, github api" />
      <script defer type="module" src="/src/main.ts"></script>
   </head>

   <body class="dark font-mono">
      <main class="container mx-auto flex h-screen flex-col gap-5 px-4 py-20">
         <section class="flex flex-col-reverse items-center gap-5 md:flex-row">
            <div class="max-w-100 md:text-right">
               <h1 class="text-2xl font-bold">Task Bridge</h1>
               <p class="py-4">Track & manage GitHub issues from a clean desktop interface.</p>
               <a id="downloadBtn" href="#download" class="btn btn-PRIMARY inline-flex w-fit text-lg">Download </a>
            </div>

            <img
               src="/screenshots/4-project-dashboard.png"
               alt="task bridge project dashboard"
               width="500"
               class="grow"
            />
         </section>
      </main>
   </body>
</html>
